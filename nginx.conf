server {
    listen 80;
    server_name justinmanion.com www.justinmanion.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name justinmanion.com www.justinmanion.com;

    ssl_certificate /etc/letsencrypt/live/justinmanion.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justinmanion.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}