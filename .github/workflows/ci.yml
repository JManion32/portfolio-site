name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    stylelint:
        name: Stylelint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run Stylelint
              run: npx stylelint "**/*.css" --fix

            - name: Build Site
              run: npm run build

    prettier:
        name: Prettier
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run Prettier
              run: npx prettier --write "."

            - name: Build Site
              run: npm run build

    eslint:
        name: ESLint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint . --fix

            - name: Build Site
              run: npm run build

    docker-build:
        name: Docker Build Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: false
                  tags: portfolio-site:test

    docker-publish:
        name: Publish Docker Image
        runs-on: ubuntu-latest
        needs: [stylelint, prettier, eslint, docker-build]

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ghcr.io/jmanion32/portfolio-site:latest

    deploy:
      name: Deploy
      runs-on: ubuntu-latest
      needs: docker-publish
      if: github.ref == 'refs/heads/main'

      steps:
        - uses: actions/checkout@v4

        - name: Deploy to droplet
          uses: appleboy/ssh-action@v1
          with:
            host: ${{ secrets.DROPLET_IP }}
            username: root
            key: ${{ secrets.SSH_KEY }}
            script: |
              docker pull ghcr.io/jmanion32/portfolio-site:latest
              docker stop portfolio 2>/dev/null || true
              docker rm portfolio 2>/dev/null || true
              docker run -d \
                --name portfolio \
                -p 80:80 \
                -p 443:443 \
                -v /etc/letsencrypt:/etc/letsencrypt:ro \
                ghcr.io/jmanion32/portfolio-site:latest
              docker image prune -af
